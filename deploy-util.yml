---
- name: Deploy Apache to Util
  hosts: util
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Apache2
      apt:
        name: apache2
        state: present

    - name: Start and enable Apache
      service:
        name: apache2
        state: started
        enabled: yes

    - name: Deploy web page
      copy:
        content: |
          <html>
            <head><title>SYS-265 Util App</title></head>
            <body><h1>Deployed via Ansible - SYS-265</h1></body>
          </html>
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'

    - name: Allow port 80 through firewall
      ufw:
        rule: allow
        port: 80
        proto: tcp
